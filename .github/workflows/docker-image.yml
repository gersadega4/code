name: Build Docker Image Multi Account

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Simpan akun ke file
      - name: Prepare accounts
        run: |
          echo "${{ secrets.DOCKER_ACCOUNTS }}" > accounts.txt

      # 3. Build image sekali
      - name: Build image once
        run: |
          docker build -t temp-image:latest .

      # 4. Loop semua akun + push
      - name: Tag & Push to all accounts
        run: |
          > results.txt

          while IFS=: read -r USERNAME PASSWORD
          do
            # skip jika kosong
            [ -z "$USERNAME" ] && continue

            # generate repo random
            REPO=$(head /dev/urandom | tr -dc a-z0-9 | head -c8)
            FULL="$USERNAME/$REPO:latest"

            echo "🚀 Pushing $FULL"

            # login
            echo "$PASSWORD" | docker login -u "$USERNAME" --password-stdin

            # tag & push
            docker tag temp-image:latest "$FULL"
            docker push "$FULL"

            # simpan hasil
            echo "https://hub.docker.com/r/$FULL" >> results.txt

            # logout
            docker logout

            # delay kecil (hindari rate limit)
            sleep 2

          done < accounts.txt

      # 5. Tampilkan hasil di log
      - name: Show results
        run: |
          echo "==== RESULT LIST ===="
          cat results.txt
