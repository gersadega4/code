name: Build Docker Image Multi Account

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Simpan akun ke file
      - name: Prepare accounts
        run: |
          echo "${{ secrets.DOCKER_ACCOUNTS }}" > accounts.txt

      # 3. Build base image sekali
      - name: Build base image
        run: |
          docker build -t temp-image:latest .

      # 4. Loop semua akun + push
      - name: Tag & Push to all accounts
        run: |
          > results.txt

          while IFS=: read -r USERNAME PASSWORD || [ -n "$USERNAME" ]
          do
            [ -z "$USERNAME" ] && continue

            REPO=$(tr -dc a-z0-9 </dev/urandom | head -c8)
            FULL="$USERNAME/$REPO:latest"

            echo "🚀 Pushing $FULL"

            # login (skip kalau gagal)
            echo "$PASSWORD" | docker login -u "$USERNAME" --password-stdin || continue

            # ===== FORCE UNIQUE LAYER =====
            echo "$RANDOM-$RANDOM-$(date +%s%N)" > random.txt

            docker build -t temp-image-mod - <<EOF
FROM temp-image:latest
COPY random.txt /random.txt
EOF

            # tag & push
            docker tag temp-image-mod "$FULL"
            docker push "$FULL"

            # simpan hasil TANPA :latest
            echo "https://hub.docker.com/r/$USERNAME/$REPO" >> results.txt

            docker logout

            sleep 2

          done < accounts.txt

      # 5. Tampilkan hasil di log
      - name: Show results
        run: |
          echo "==== RESULT LIST ===="
          cat results.txt
