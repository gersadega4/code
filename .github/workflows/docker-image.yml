- name: Tag & Push to all accounts
  run: |
    > results.txt

    while IFS=: read -r USERNAME PASSWORD
    do
      # skip kalau kosong
      [ -z "$USERNAME" ] && continue

      # generate repo
      REPO=$(head /dev/urandom | tr -dc a-z0-9 | head -c8)
      FULL="$USERNAME/$REPO:latest"

      echo "🚀 Pushing $FULL"

      # login
      echo "$PASSWORD" | docker login -u "$USERNAME" --password-stdin

      # tag & push
      docker tag temp-image:latest "$FULL"
      docker push "$FULL"

      # simpan hasil
      echo "https://hub.docker.com/r/$FULL" >> results.txt

      docker logout
      sleep 2

    done < accounts.txt
