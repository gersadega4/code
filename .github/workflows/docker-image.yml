name: Build Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Pushs
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            sten5euse5/a7k3m9q2:latest
            sten5euse5/z4x8c1v7:latest
            sten5euse5/p2t9w6k3:latest
            sten5euse5/n5m1q8z4:latest
            sten5euse5/r8v3c2x9:latest
            sten5euse5/b6k9t1p4:latest
            sten5euse5/y1q7m3z8:latest
            sten5euse5/f9x2c5v1:latest
            sten5euse5/d3p8k6t2:latest
            sten5euse5/h7m1q4z9:latest
