name: Build Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Simpan akun ke file
      - name: Prepare accounts
        run: |
          echo "${{ secrets.DOCKER_ACCOUNTS }}" > accounts.txt

      # 🔥 Build SEKALI
      - name: Build image once
        run: |
          docker build -t temp-image:latest .

      # 🚀 Loop semua akun (tanpa rebuild)
      - name: Tag & Push to all accounts
        run: |
          while IFS= read -r LINE
          do
            USERNAME=$(echo $LINE | cut -d: -f1)
            PASSWORD=$(echo $LINE | cut -d: -f2)

            REPO=$(cat /dev/urandom | tr -dc 'a-z0-9' | head -c8)

            echo "Pushing $USERNAME/$REPO:latest"

            # login
            echo $PASSWORD | docker login -u $USERNAME --password-stdin

            # tag dari image yang sama
            docker tag temp-image:latest $USERNAME/$REPO:latest

            # push
            docker push $USERNAME/$REPO:latest

            # logout biar clean
            docker logout

          done < accounts.txt
